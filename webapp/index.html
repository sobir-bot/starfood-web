<!DOCTYPE html>
<html lang="tg">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>StarFood</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<h1>
🍔 StarFood
</h1>

<!-- Категорияҳо -->

<div id="categories"></div>


<!-- Маҳсулот -->

<div id="products"></div>


<!-- Floating Cart -->

<div id="cart-total" class="cart-bar">

🛒 0 дона | 0 смн

</div>



<!-- Modal -->

<div id="cartModal" class="modal">

<div class="modal-content">

<h2>
🛒 Сабад
</h2>

<div id="cartItems"></div>


<div id="cartPrice">

💰 Ҳамагӣ: 0 смн

</div>





<button id="orderBtn">

✅ Оформить заказ

</button>


<button id="closeCart">

❌ Пӯшидан

</button>


</div>

</div>


<script src="app.js"></script>

</body>

</html>
